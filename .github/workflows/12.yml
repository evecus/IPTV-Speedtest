name: Nuke Repository Content

on:
  workflow_dispatch: # 仅允许手动触发，防止误操作

jobs:
  nuke:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限才能推送更改

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史

      - name: Remove all files
        run: |
          # 配置 Git 用户信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 删除当前目录下除 .git 外的所有内容
          # 使用 find 确保隐藏文件（如 .gitignore）也能被删除
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          
          # 检查是否有内容需要提交（防止仓库本身就是空的导致报错）
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: clear all repository contents via workflow"
            git push origin ${{ github.ref_name }}
          else
            echo "No files to remove."
          fi
